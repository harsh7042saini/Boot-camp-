<!DOCTYPE html>
<html>

<head>

    <title>Naaptol Store</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f4f8ff;
        }

        header {

            background:
                linear-gradient(90deg,
                    #2563eb,
                    #60a5fa);

            padding: 20px;

            color: white;

            position: sticky;

            top: 0;

        }

        .header {

            max-width: 1200px;

            margin: auto;

            display: flex;

            justify-content: space-between;

            flex-wrap: wrap;

            gap: 10px;

        }

        .controls {

            display: flex;

            gap: 10px;

            flex-wrap: wrap;

        }

        input,
        select,
        button {

            padding: 10px;

            border: none;

            border-radius: 10px;

        }

        button {

            background:
                linear-gradient(90deg,
                    #111,
                    #444);

            color: white;

            cursor: pointer;

        }

        .grid {

            max-width: 1200px;

            margin: 30px auto;

            display: grid;

            grid-template-columns:
                repeat(auto-fit,
                    minmax(240px, 1fr));

            gap: 20px;

            padding: 0 20px;

        }

        .card {

            background: white;

            padding: 18px;

            border-radius: 18px;

            box-shadow:
                0 10px 20px #0001;

            text-align: center;

        }

        .card:hover {

            transform:
                translateY(-6px);

            transition: .3s;

        }

        img {

            width: 100%;

            height: 180px;

            object-fit: contain;

        }

        .price {

            color: #2563eb;

            font-size: 22px;

            font-weight: bold;

            margin: 10px;

        }

        .remove {

            background: red;

        }

        .hide {
            display: none;
        }
    </style>

</head>

<body>

    <header>

        <div class="header">

            <h2>
                🛍️ Naaptol Store
            </h2>

            <div class="controls">

                <input id="search" placeholder="Search">

                <select id="sort">

                    <option value="">
                        Sort Price
                    </option>

                    <option value="low">
                        Low → High
                    </option>

                    <option value="high">
                        High → Low
                    </option>

                </select>

                <button id="cartBtn">

                    Cart (0)

                </button>

            </div>

        </div>

    </header>

    <div id="products" class="grid"></div>

    <div id="cart" class="grid hide"></div>

    <script>

        let data = [];

        let basket =
            JSON.parse(
                localStorage.getItem(
                    "cart"
                )
            ) || [];

        function update() {

            cartBtn.innerText =

                `Cart (${basket.length})`;

            localStorage.setItem(
                "cart",
                JSON.stringify(
                    basket
                )
            );

        }

        async function load() {

            let r =
                await fetch(
                    "https://fakestoreapi.com/products"
                );

            data =
                await r.json();

            show(data);

        }

        function show(arr) {

            products.innerHTML = "";

            arr.forEach(p => {

                products.innerHTML += `

<div class=card>

<img src="${p.image}">

<h3>

${p.title}

</h3>

<div>

⭐ ${p.rating.rate
                    }

(
${p.rating.count}
)

</div>

<div class=price>

₹${Math.round(
                        p.price * 85
                    )}

</div>

<button
onclick=
"add(${p.id})"
>

Add To Cart

</button>

</div>

`;

            });

        }

        function add(id) {

            basket.push(

                data.find(
                    x =>
                        x.id == id
                )

            );

            update();

        }

        function showCart() {

            cart.innerHTML = "";

            if (!basket.length) {

                cart.innerHTML =

                    "<h2>Cart Empty</h2>";

                return;

            }

            basket.forEach(
                (p, i) => {

                    cart.innerHTML += `

<div class=card>

<img src="${p.image}">

<h3>

${p.title}

</h3>

<div class=price>

₹${Math.round(
                        p.price * 85
                    )}

</div>

<button

class=remove

onclick=
"del(${i})"

>

Remove

</button>

</div>

`;

                });

        }

        function del(i) {

            basket.splice(i, 1);

            update();

            showCart();

        }

        search.oninput =
            () => {

                show(

                    data.filter(

                        x =>

                            x.title

                                .toLowerCase()

                                .includes(

                                    search.value

                                        .toLowerCase()

                                )

                    )

                );

            };

        sort.onchange =
            () => {

                let x =
                    [...data];

                if (
                    sort.value == "low"
                )

                    x.sort(
                        (a, b) =>
                            a.price - b.price
                    );

                if (
                    sort.value == "high"
                )

                    x.sort(
                        (a, b) =>
                            b.price - a.price
                    );

                show(x);

            };

        let open = false;

        cartBtn.onclick =
            () => {

                open = !open;

                products.classList.toggle(
                    "hide"
                );

                cart.classList.toggle(
                    "hide"
                );

                if (open)
                    showCart();

            };

        update();

        load();

    </script>

</body>

</html>
