    <title>Promise</title>

</body>

<script>

    // 1. Take count value
    var count = 5;

    // 2. Create new Promise
    var promise = new Promise((resolve, reject) => {

        if (count > 0) {
            resolve("Positive count");
        } else {
            reject("Negative count");
        }

    });

    console.log(promise);

    // 3. Read values from Promise
    promise
        .then((res) => {
            console.log(res);
        })

        .catch((rej) => {
            console.log(rej);
        });

</script>
