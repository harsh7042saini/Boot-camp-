<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get values from input tag </title>
</head>

<body>
    <input type="text" id="ip" placeholder="Enter your name">
    <button onclick="getName">Submit</button>

    
</body>

</html>

<script>

    function getname() {
        // Step-1: Select
        const ip = document.getElementById("ip")
        console.log(ip);

        // Step-2: Get value
        const data = ip.value
        console.log(data);

        // step3- 
        document.getelementbyid("nm").innertext=data
    }
</script>
