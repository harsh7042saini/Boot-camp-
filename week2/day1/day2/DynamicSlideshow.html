<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Slideshow</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #fcfcfc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #2b619e;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .slider-container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
            text-align: center;
        }

        .slide-wrapper {
            position: relative;
            width: 100%;
            height: 350px;
            background-color: #eee;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .slide-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-number {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 14px;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-action {
            background-color: #2b619e;
            color: white;
        }

        .btn-action:hover {
            background-color: #3973b6;
        }

        .btn-nav {
            background-color: #0468aa;
            color: white;
            flex: 1;
            max-width: 120px;
        }

        .btn-nav:hover {
            background-color: #2b619e;
        }

        @media (max-width: 480px) {
            .slide-wrapper {
                height: 250px;
            }

            button {
                padding: 8px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <h1>Image Slideshow</h1>

    <div class="slider-container">
        <div class="slide-wrapper">
            <span class="slide-number" id="slide-index">1 / 20</span>
            <img id="slider-image" src="" alt="Slideshow Image">
        </div>

        <div class="controls-row">
            <button class="btn-action" onclick="startSlideshow()">Start Auto</button>
            <button class="btn-action" onclick="stopSlideshow()">Stop Auto</button>
        </div>

        <div class="controls-row">
            <button class="btn-nav" onclick="manualNav(-1)">Previous</button>
            <button class="btn-nav" onclick="manualNav(1)">Next</button>
        </div>
    </div>

    <script>
        const images = [
            "https://picsum.photos/id/10/600/400",
            "https://picsum.photos/id/11/600/400",
            "https://picsum.photos/id/12/600/400",
            "https://picsum.photos/id/13/600/400",
            "https://picsum.photos/id/14/600/400",
            "https://picsum.photos/id/15/600/400",
            "https://picsum.photos/id/16/600/400",
            "https://picsum.photos/id/17/600/400",
            "https://picsum.photos/id/18/600/400",
            "https://picsum.photos/id/19/600/400",
            "https://picsum.photos/id/20/600/400",
            "https://picsum.photos/id/21/600/400",
            "https://picsum.photos/id/22/600/400",
            "https://picsum.photos/id/23/600/400",
            "https://picsum.photos/id/24/600/400",
            "https://picsum.photos/id/25/600/400",
            "https://picsum.photos/id/26/600/400",
            "https://picsum.photos/id/27/600/400",
            "https://picsum.photos/id/28/600/400",
            "https://picsum.photos/id/29/600/400"
        ];

        let currentIndex = 0;
        let slideInterval = null;

        const imgElement = document.getElementById("slider-image");
        const indexElement = document.getElementById("slide-index");

        function updateSlide() {
            imgElement.src = images[currentIndex];
            indexElement.innerText = `${currentIndex + 1} / ${images.length}`;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % images.length;
            updateSlide();
        }

        function startSlideshow() {
            if (slideInterval === null) {
                slideInterval = setInterval(nextSlide, 2000);
            }
        }

        function stopSlideshow() {
            if (slideInterval !== null) {
                clearInterval(slideInterval);
                slideInterval = null;
            }
        }

        function manualNav(direction) {
            stopSlideshow();
            currentIndex += direction;

            if (currentIndex < 0) {
                currentIndex = images.length - 1;
            } else if (currentIndex >= images.length) {
                currentIndex = 0;
            }

            updateSlide();
        }

        updateSlide();
        startSlideshow();
    </script>
</body>

</html>
