<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event</title>
</head>

<body>
    <!-- Event Name    Event Listener -->
    <button onclick="likeme()">click</button>
</body>

</html>

<script>
    //  Event Handler
    function likeme() {
        alert("Someone likes bunty")
        console.log("Someone likes bunty")
    }
</script>
