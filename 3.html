<!DOCTYPE html>
<html lang="en">

<head>
    <title>types of list</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- <link href="css/style.css" rel="stylesheet"> -->
</head>

<body>
    <!-- unordered list -->
    <ul type="disc">
        <li>One</li>
        <li>Two</li>
        <li>Three</li>
    </ul>

    <ul type="circle">
        <li>Four</li>
        <li>Five</li>
        <li>Six</li>
    </ul>

    <ul type="square">
        <li>seven</li>
        <li>Eight</li>
        <li>Nine</li>
    </ul>

    <!-- ordered list -->
    <ol type="1" start="5">
        <li>One</li>
        <li>Two</li>
        <li>Three</li>
    </ol>\

    <ol type="A" start="3">
        <li>Four</li>
        <li>Five</li>
        <li>Six</li>
    </ol>

    <ol type="a" start="4">
        <li>seven</li>
        <li>Eight</li>
        <li>Nine</li>
    </ol>
</body>

</html>
