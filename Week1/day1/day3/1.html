<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>

    <style>
        .cont {
            background-color: black;
            padding: 20px;
            display: grid;
            /* grid-template-columns: 100px 100px 100px;
            grid-template-rows: 100px 100px 100px; */
            grid-template-columns: repeat(3, 1fr);
            /* gap: 10px 20px; */
            /* row-gap: 20px;
            column-gap: 10px; */
            grid-template-areas: "one two three"
                "four five six"
                "seven eight nine";

        }

        .cont>div {
            padding: 20px;
        }

        #one {
            background-color: red;
            grid-area: one;
        }

        #two {
            background-color: orange;
            grid-area: two;
        }

        #three {
            background-color: yellow;
            grid-area: three;
        }

        #four {
            background-color: green;
            /* grid lines:RS/CS/RE/CE
            grid-area: 2/1/4/2; */
            grid-area: four;
        }

        #five {
            background-color: cyan;
            /* grid-area: 2/2/3/4; */
            grid-area: five;
        }

        #six {
            background-color: blue;
            grid-area: six;
        }

        #seven {
            background-color: indigo;
            grid-area: seven;
        }

        #eight {
            background-color: violet;
            grid-area: eight;
        }

        #nine {
            background-color: white;
            grid-area: nine;
        }
    </style>
</head>

<body>
    <div class="cont">
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="four">4</div>
        <div id="five">5</div>
        <!-- <div id="six">6</div> -->
        <div id="seven">7</div>
        <div id="eight">8</div>
        <div id="nine">9</div>
    </div>
</body>

</html>
