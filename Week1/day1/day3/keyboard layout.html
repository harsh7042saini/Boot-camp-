<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Layout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f3f3f3;
            font-family: Georgia, serif;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
        }

        .keyboard {
            width: 92%;
            margin: 30px auto;
            padding: 20px;
            border: 1px solid #d0d0d0;
            border-radius: 15px;
            background: white;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .key {
            height: 80px;
            min-width: 80px;
            flex: 1;
            border-radius: 12px;
            border: none;
            font-size: 20px;
            cursor: pointer;

            background: linear-gradient(145deg,
                    #e8e8ec,
                    #d6d6da);

            box-shadow:
                inset 3px 3px 8px rgba(255, 255, 255, .8),
                inset -3px -3px 8px rgba(0, 0, 0, .08);
        }

        .wide {
            flex: 1.5;
        }

        .enter {
            flex: 2;
            font-weight: bold;
            color: #1f4b63;
        }

        .shift {
            flex: 2;
            font-weight: bold;
            color: #1f4b63;
        }

        .space {
            flex: 4;
            font-weight: bold;
            color: #1f4b63;
        }
    </style>
</head>

<body>

    <h1>CT Calculator Task</h1>

    <div class="keyboard">

        <!-- Row 1 -->
        <div class="row">
            <button class="key wide">~</button>
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
            <button class="key">0</button>
            <button class="key wide">Delete</button>
        </div>

        <!-- Row 2 -->
        <div class="row">
            <button class="key wide">tab</button>
            <button class="key">Q</button>
            <button class="key">W</button>
            <button class="key">E</button>
            <button class="key">R</button>
            <button class="key">T</button>
            <button class="key">Y</button>
            <button class="key">U</button>
            <button class="key">I</button>
            <button class="key">O</button>
            <button class="key">P</button>
            <button class="key">\</button>
        </div>

        <!-- Row 3 -->
        <div class="row">
            <button class="key wide">Caps</button>
            <button class="key">A</button>
            <button class="key">S</button>
            <button class="key">D</button>
            <button class="key">F</button>
            <button class="key">G</button>
            <button class="key">H</button>
            <button class="key">J</button>
            <button class="key">K</button>
            <button class="key">L</button>
            <button class="key enter">Enter</button>
        </div>

        <!-- Row 4 -->
        <div class="row">
            <button class="key wide">Shift</button>
            <button class="key">Z</button>
            <button class="key">X</button>
            <button class="key">C</button>
            <button class="key">V</button>
            <button class="key">B</button>
            <button class="key">N</button>
            <button class="key">M</button>
            <button class="key">&lt;</button>
            <button class="key">&gt;</button>
            <button class="key shift">Shift</button>
        </div>

        <!-- Row 5 -->
        <div class="row">
            <button class="key">Windows</button>
            <button class="key">ctrl</button>
            <button class="key">Options</button>
            <button class="key">Alt</button>
            <button class="key space">Space</button>
            <button class="key">alt</button>
            <button class="key">Option</button>
            <button class="key">&lt;</button>
            <button class="key">&gt;</button>
        </div>

    </div>

</body>

</html>
