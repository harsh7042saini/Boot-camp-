<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Specificity</title>

    <style>
        .head {
            color: red;

        }

        p {
            color: blue;
        }

        * {
            background-color: rgb(0, 64, 255);
            font-size: 40px;
        }
    </style>
</head>

<body>
    <p id="para" class="head" style="color: white;">
        Hello World
    </p>
</body>

</html>
