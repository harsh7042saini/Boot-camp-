<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        h3 {
            background-color: yellow;
        }

        #para2 {
            background-color: #4eadc7;
        }

        .w1 {
            text-decoration: underline;
        }

        div,
        p,
        #para2 {
            border: 1px solid red;
        }

        * {
            font-family: 'Arial', sans-serif;
        }
    </style>
</head>

<body>
    <div>I am a box</div>
    <h1>Hello from heading 1</h1>
    <h3 id="para2">Hello from heading 2</h3>
    <h3 class="w1">Hello from heading 3</h3>
    <p>Hello from heading</p>
    <div>
        <span>Hello</span><span class="white">World</span>
    </div>


</body>

</html>
