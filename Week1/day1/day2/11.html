<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS flex</title>

    <style>
        .cont>div {
            width: 100px;
            /* height:100px; */
            border: 1px solid red;
            font-size: 30px;
            padding: 30px;

        }

        .cont>div:nth-child(1) {
            background-color: red;
            order: 12;
            flex-grow: 1;
            flex-shrink: 1;
            flex-basis: 300px;

        }

        .cont>div:nth-child(2) {
            background-color: green;
        }

        .cont>div:nth-child(3) {
            background-color: blue;
        }

        .cont {
            border: 1px solid black;
            padding: 20px;
            margin: 10px;
            display: flex;
            background-color: aquamarine;
            flex-direction: row;
            justify-content: center;
            align-items: center;

        }
    </style>


</head>

<body>
    <h1>Welcome to CSS flex</h1>
    <div>
        <div class="cont">
            <div>1</div>
            <div>2</div>
            <div>3</div>
</body>

</html>
