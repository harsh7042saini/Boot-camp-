<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>College Event Registration</title>
</head>

<body>

    <h1>College Event Registration 📝</h1>

    <form>

        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age">
        <br><br>

        <p>Select Event Category:</p>

        <input type="checkbox" id="coding" name="event" value="Coding">
        <label for="coding">Coding Hackathon 💻</label>
        <br>

        <input type="checkbox" id="debate" name="event" value="Debate">
        <label for="debate">Debate Competition 🎤</label>
        <br>

        <input type="checkbox" id="sports" name="event" value="Sports">
        <label for="sports">Sports Tournament ⚽</label>
        <br><br>

        <label for="eventdate">Event Date:</label>
        <input type="date" id="eventdate" name="eventdate">
        <br><br>

        <label for="time">Preferred Time Slot:</label>
        <input type="time" id="time" name="time">
        <br><br>

        <input type="submit" value="Register Now">

    </form>

</body>

</html>
