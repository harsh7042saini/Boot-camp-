<form>
    <label for="name">Name:</label>
    <input type="text" name="name" id="name" placeholder="Enter your name" required>
    <br><br>
    <label for="email">Email:</label>
    <input type="text" name="email" id="email" placeholder="Enter your email" required>
    <br><br>
    <label for="password">Password:</label>
    <input type="password" name="password" id="password" placeholder="Enter your password" required>
    <br><br>
    <label for="gender">Gender:</label>
    <input type="radio" name="gender" id="male" value="male">
    <label for="male">Male</label>
    <input type="radio" name="gender" id="female" value="female">
    <label for="female">Female</label>
    <br><br>
    <label for="language">Language:</label>
    <input type="checkbox" name="language" id="english" value="english">
    <label for="hindi">Hindi</label>
    <input type="checkbox" name="language" id="hindi" value="hindi">
    <label for="html">HTML</label>
    <input type="checkbox" name="language" id="html" value="html">
    <label for="english">English</label>
    <br><br>
    <label for="course">Course:</label>
    <select name="course" id="course">
        <option value="web development">Web Development</option>
        <option value="data science">Data Science</option>
        <option value="cyber security">Cyber Security</option>
    </select>
    <br><br>
    <label for="feedback">Summary:</label>
    <textarea name="feedback" id="feedback" placeholder="Enter your Feedback"></textarea>
    <br><br>
    <button type="submit">Submit</button>
</form>
